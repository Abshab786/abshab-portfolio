<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap | AB SHAB</title>
    <link rel="icon" type="image/png" href="assets/images/only_ab_logo.png">
    <link rel="apple-touch-icon" href="assets/images/only_ab_logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-base: #FAF7FF;
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --secondary: #EC4899;
            --text-main: #1F2937;
            --text-sub: #4B5563;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --nav-bg: rgba(255, 255, 255, 0.4);
            --radius: 24px;
            --shadow-premium: 0 20px 40px rgba(139, 92, 246, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --bg-base: #0F172A;
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(51, 65, 85, 0.5);
            --nav-bg: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-base); color: var(--text-main); line-height: 1.6; transition: background-color 0.4s ease; }
        /* Logo Styling */
        .nav-logo { width: 44px; height: auto; margin-right: 12px; }
        .logo-wrapper { display: flex; align-items: center; text-decoration: none; }
        .footer-logo-box { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
        .footer-logo { width: 40px; height: auto; }
        .footer-brand-name { font-size: 1.25rem; font-weight: 800; color: var(--text-main); }
        @media (max-width: 1024px) { .nav-logo { width: 38px; } }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 48px; width: 100%; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-premium); }

        /* Navbar */
        .navbar { position: fixed; top: 1.5rem; left: 0; right: 0; z-index: 1000; }
        .nav-container { max-width: 1000px; margin: 0 auto; padding: 0.8rem 2rem; border-radius: 100px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--text-main); text-decoration: none; }
        .theme-toggle-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .dark-mode .moon-icon, .sun-icon { display: none; }
        .dark-mode .sun-icon { display: block; }
        .moon-icon { display: block; }

        /* Header */
        .page-header { padding: 12rem 0 4rem; text-align: center; }
        .page-header h1 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, var(--text-main), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }

        /* Sitemap Grid */
        .sitemap-card { padding: 4rem; border-radius: var(--radius); margin-bottom: 8rem; }
        .sitemap-section { margin-bottom: 3rem; }
        .sitemap-section h2 { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .sitemap-section h2::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

        .sitemap-links { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
        .sitemap-item { text-decoration: none; color: var(--text-main); font-weight: 600; display: flex; align-items: center; gap: 10px; padding: 1rem; border-radius: 15px; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); transition: var(--transition); }
        .sitemap-item:hover { background: var(--primary); color: #fff; transform: translateX(5px); border-color: var(--primary); }
        .dark-mode .sitemap-item { background: rgba(30, 41, 59, 0.4); }

        /* Footer */
        .footer { padding: 4rem 0; text-align: center; border-top: 1px solid var(--glass-border); }
        .footer-links { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-sub); }
        .footer-links a { text-decoration: none; color: inherit; transition: color 0.3s; }
        .footer-links a:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .container { padding: 0 24px; }
            .page-header h1 { font-size: 2.5rem; }
            .sitemap-card { padding: 2rem; }
        }
    </style>
</head>
<body class="premium-theme">
    <header class="navbar">
        <nav class="nav-container glass">
            <a href="index.html" class="logo">AB SHAB</a>
            <div class="nav-action">
                <button id="themeToggle" class="theme-toggle-btn"><i data-lucide="moon" class="moon-icon"></i><i data-lucide="sun" class="sun-icon"></i></button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="page-header">
            <h1>Sitemap</h1>
            <p style="color: var(--text-sub);">Navigate through all the pages and sections of AB SHAB's portfolio.</p>
        </section>

        <div class="sitemap-card glass">
            <div class="sitemap-section">
                <h2><i data-lucide="home"></i> Main Pages</h2>
                <div class="sitemap-links">
                    <a href="index.html" class="sitemap-item"><i data-lucide="layout"></i> Home</a>
                    <a href="privacy.html" class="sitemap-item"><i data-lucide="shield"></i> Privacy Policy</a>
                    <a href="terms.html" class="sitemap-item"><i data-lucide="file-text"></i> Terms & Conditions</a>
                    <a href="support.html" class="sitemap-item"><i data-lucide="help-circle"></i> Support</a>
                </div>
            </div>

            <div class="sitemap-section">
                <h2><i data-lucide="anchor"></i> Home Sections</h2>
                <div class="sitemap-links">
                    <a href="index.html#about" class="sitemap-item"><i data-lucide="user"></i> About Me</a>
                    <a href="index.html#services" class="sitemap-item"><i data-lucide="briefcase"></i> Services</a>
                    <a href="index.html#skills" class="sitemap-item"><i data-lucide="code-2"></i> Skills</a>
                    <a href="index.html#updates" class="sitemap-item"><i data-lucide="layers"></i> Projects</a>
                    <a href="index.html#team" class="sitemap-item"><i data-lucide="users"></i> Team</a>
                    <a href="index.html#contact" class="sitemap-item"><i data-lucide="mail"></i> Contact</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-links">
            <a href="terms.html">Terms</a> • <a href="privacy.html">Privacy</a> • <a href="support.html">Support</a> • <a href="sitemap.html">Sitemap</a>
        </div>
        <p style="color: var(--text-sub); font-size: 0.9rem;">&copy; 2026 AB SHAB. All Rights Reserved.</p>
    </footer>

    <script>
        lucide.createIcons();
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark-mode'); }
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark-mode') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
